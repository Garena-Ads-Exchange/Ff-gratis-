<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE AUDITORÍA - ADS EXCHANGE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #ff4655; --bg: #060606; }
        body { background-color: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; }
        .font-gamer { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 15, 15, 0.98); border: 1px solid rgba(255, 70, 85, 0.2); }
        .btn-premium { background: linear-gradient(135deg, #ff4655 0%, #b91c1c 100%); box-shadow: 0 0 15px rgba(255, 70, 85, 0.3); }
        #ad-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .progress-line { width: 80%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        #ad-progress { width: 0%; height: 100%; background: var(--accent); }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen justify-center">

    <div id="ad-overlay">
        <div class="text-center w-full max-w-sm px-4">
            <h2 class="font-gamer text-[10px] text-red-500 mb-4 tracking-[0.3em] uppercase">Auditando Sesión...</h2>
            
            <div id="countdown" class="font-gamer text-7xl text-white mb-4">30</div>
            
            <div class="progress-line mx-auto mb-8"><div id="ad-progress"></div></div>
            
            <div id="ad-container" class="min-h-[200px] w-full bg-white/5 rounded-xl border border-white/10 flex items-center justify-center overflow-hidden">
                <p id="ad-status" class="text-[10px] text-gray-500 animate-pulse uppercase">Cargando Sponsor Oficial...</p>
            </div>
            
            <p class="text-[9px] text-gray-600 mt-6 uppercase tracking-widest">No cierres esta ventana para validar el ID</p>
        </div>
    </div>

    <main class="w-full max-w-md space-y-6">
        <header class="text-center mb-4">
            <div class="border border-red-600/30 text-red-500 text-[10px] font-bold px-4 py-2 rounded-full inline-block font-gamer bg-red-600/5">
                ADS-EXCHANGE PROTOCOL v2.5
            </div>
        </header>

        <section id="step1" class="glass p-8 rounded-[2rem] space-y-6">
            <div class="text-center">
                <p class="text-[10px] text-gray-500 mb-2 uppercase font-gamer">Ingresar ID de Jugador</p>
                <input type="number" id="playerid" placeholder="00000000" class="w-full bg-black border border-white/10 p-5 rounded-2xl outline-none text-white font-bold text-center text-2xl tracking-widest focus:border-red-600">
            </div>
            <button onclick="startAudit('toLoading', 15)" class="w-full btn-premium p-5 rounded-2xl font-gamer text-[11px] uppercase tracking-wider">Verificar ID</button>
        </section>

        <section id="step2" class="hidden glass p-6 rounded-[2rem] space-y-4 text-center">
            <p class="text-[10px] text-gray-500 uppercase font-gamer mb-2">Módulos de Sponsor</p>
            <button onclick="startAudit('ad1', 30)" id="b1" class="w-full bg-white/5 p-6 rounded-3xl border border-white/10 flex justify-between items-center">
                <div class="text-left"><p class="text-[11px] font-bold">MÓDULO ALPHA</p><p class="text-[9px] text-red-500">PENDIENTE</p></div>
                <span id="st1" class="text-[9px] font-bold border border-red-500 text-red-500 px-3 py-1 rounded-full">INICIAR</span>
            </button>
            <button onclick="startAudit('ad2', 30)" id="b2" disabled class="w-full bg-white/5 p-6 rounded-3xl border border-white/10 flex justify-between items-center opacity-30">
                <div class="text-left"><p class="text-[11px] font-bold">MÓDULO BETA</p><p class="text-[9px] text-gray-500">BLOQUEADO</p></div>
                <span id="st2" class="text-[9px] font-bold border border-white/10 text-gray-500 px-3 py-1 rounded-full">WAIT</span>
            </button>

            <div id="final" class="hidden mt-6 pt-6 border-t border-white/5">
                <button onclick="shareWA()" class="w-full bg-green-600 p-6 rounded-2xl font-gamer text-[11px] uppercase font-bold">Compartir y Recibir</button>
            </div>
        </section>
    </main>

    <script>
        let currentStep = '';
        let shareCount = 0;
        const SMARTLINK = "https://www.profitablecpmratenetwork.com/frijybds?key=6324b8f82b147840d49d344d24320722";

        function startAudit(step, secs) {
            if(step === 'toLoading' && document.getElementById('playerid').value.length < 5) return alert("ID INVÁLIDO");
            
            currentStep = step;
            const overlay = document.getElementById('ad-overlay');
            const counter = document.getElementById('countdown');
            const progress = document.getElementById('ad-progress');
            const adContainer = document.getElementById('ad-container');
            
            // 1. Mostrar el overlay inmediatamente
            overlay.style.display = 'flex';
            counter.innerText = secs;
            progress.style.width = '0%';
            
            // 2. Abrir publicidad en otra pestaña
            window.open(SMARTLINK, '_blank');

            // 3. Inyectar el banner de Adsterra (Sponsor)
            adContainer.innerHTML = ''; 
            const s = document.createElement('script');
            s.src = 'https://pl29291497.profitablecpmratenetwork.com/b19ca2676094a68085d2bb3d761280fb/invoke.js';
            const c = document.createElement('div');
            c.id = 'container-b19ca2676094a68085d2bb3d761280fb';
            adContainer.appendChild(s);
            adContainer.appendChild(c);

            // 4. Temporizador forzado (Independiente de la carga)
            let time = secs;
            const timer = setInterval(() => {
                time--;
                counter.innerText = time;
                progress.style.width = ((secs - time) / secs * 100) + '%';
                
                if(time <= 0) {
                    clearInterval(timer);
                    overlay.style.display = 'none';
                    logic();
                }
            }, 1000);
        }

        function logic() {
            if(currentStep === 'toLoading') {
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
            } else if(currentStep === 'ad1') {
                document.getElementById('st1').innerText = "LISTO ✓";
                document.getElementById('st1').className = "text-[9px] font-bold text-green-500 border border-green-500 px-3 py-1 rounded-full";
                document.getElementById('b2').disabled = false;
                document.getElementById('b2').classList.remove('opacity-30');
            } else if(currentStep === 'ad2') {
                document.getElementById('st2').innerText = "LISTO ✓";
                document.getElementById('st2').className = "text-[9px] font-bold text-green-500 border border-green-500 px-3 py-1 rounded-full";
                document.getElementById('final').classList.remove('hidden');
            }
        }

        function shareWA() {
            const msg = "💎 RECARGA POR PUBLICIDAD 💎\nMira 30 segundos de anuncios y recibe 110 unidades. Intercambio directo.\nLink: " + window.location.href;
            if(shareCount < 2) {
                alert("Debes compartir en 2 grupos para validar tráfico humano. Faltan: " + (2 - shareCount));
                window.open("https://wa.me/?text=" + encodeURIComponent(msg), '_blank');
                shareCount++;
            } else {
                alert("✅ AUDITORÍA EXITOSA. ID validado. Recarga en proceso (1-12h).");
                location.reload();
            }
        }
    </script>
</body>
</html>
