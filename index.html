<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="💎 GARENA ADS EXCHANGE: 110 DIAMANTES">
    <meta property="og:description" content="Portal oficial de intercambio. Recibe diamantes directamente en tu ID por verificar anuncios patrocinados.">
    <meta property="og:image" content="https://garena-ads-exchange.github.io/Ff-gratis-/preview.png?v=777">
    <meta property="og:image:secure_url" content="https://garena-ads-exchange.github.io/Ff-gratis-/preview.png?v=777">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:url" content="https://garena-ads-exchange.github.io/Ff-gratis-/">

    <title>GARENA ADS EXCHANGE - RECOMPENSAS</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: white; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .glass { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        .font-gamer { font-family: 'Orbitron', sans-serif; }
        .step-hidden { display: none; }
        .btn-glow { background: linear-gradient(180deg, #ff4655, #800000); box-shadow: 0 0 15px rgba(255, 70, 85, 0.6); animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0%, 100% { box-shadow: 0 0 5px rgba(255, 70, 85, 0.6); } 50% { box-shadow: 0 0 25px rgba(255, 70, 85, 0.9); } }
        #ad-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body class="flex flex-col items-center p-4 min-h-screen">
    <canvas id="bulletCanvas"></canvas>
    
    <div id="ad-overlay">
        <div class="glass p-8 max-w-xs text-center">
            <p class="text-[10px] text-gray-500 mb-2 uppercase">Validando Impresión Publicitaria</p>
            <h3 class="font-gamer text-xs text-white mb-4 animate-pulse">CARGANDO RECOMPENSA...</h3>
            <div class="w-full bg-white/10 h-1 mb-4"><div id="ad-progress" class="h-full bg-red-600 w-0 transition-all"></div></div>
            <p class="text-[9px] text-red-500">No cierres esta ventana.</p>
        </div>
    </div>

    <header class="text-center mb-8">
        <img src="https://freefiremobile-a.akamaihd.net/ffwebsite/images/download/logo_page.png" class="w-32 mx-auto opacity-80">
    </header>

    <main class="w-full max-w-md">
        <section id="step1" class="glass p-6 border-t-2 border-white/20">
            <h1 class="font-gamer text-sm text-center mb-6 tracking-widest text-red-500">GARENA ADS EXCHANGE</h1>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Nombre de Jugador" class="w-full bg-black border border-white/10 p-4 rounded-xl text-center focus:border-red-600 outline-none">
                <input type="number" id="playerid" placeholder="ID de Cuenta" class="w-full bg-black border border-white/10 p-4 rounded-xl text-center focus:border-red-600 outline-none">
                <button onclick="triggerAd('toLoading')" class="w-full btn-glow p-4 rounded-xl font-gamer text-[10px]">INICIAR PROTOCOLO</button>
            </div>
        </section>

        <section id="step2" class="step-hidden glass p-10 text-center">
            <div class="w-12 h-12 border-2 border-red-600 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
            <h2 class="font-gamer text-[10px] text-white">SINCRONIZANDO...</h2>
            <div class="w-full bg-white/5 h-1 mt-6 rounded-full overflow-hidden"><div id="bar" class="h-full bg-red-600 w-0 transition-all"></div></div>
        </section>

        <section id="step3" class="step-hidden glass p-6 border-t-2 border-green-500">
            <div class="text-center mb-6">
                <p id="disp-name" class="font-gamer text-xs text-white"></p>
                <p id="disp-id" class="text-[9px] text-gray-500"></p>
            </div>
            <div class="space-y-3">
                <button onclick="triggerAd('ad1')" class="w-full bg-white/5 p-5 rounded-xl border border-white/10 flex justify-between items-center">
                    <span class="text-[10px]">TAREA 1: VERIFICAR</span>
                    <span id="st1" class="text-[9px] text-red-600 font-bold">PNDTE.</span>
                </button>
                <button onclick="triggerAd('ad2')" id="btn2" disabled class="w-full bg-white/5 p-5 rounded-xl border border-white/10 flex justify-between items-center opacity-25">
                    <span class="text-[10px]">TAREA 2: VERIFICAR</span>
                    <span id="st2" class="text-[9px] font-bold">BLOQUEADO</span>
                </button>
            </div>
            <div id="final" class="step-hidden mt-6"><button onclick="shareWA()" class="w-full bg-green-600 p-4 rounded-xl font-gamer text-[10px]">RECLAMAR 110 DIAMANTES</button></div>
        </section>
    </main>

    <script>
        const canvas = document.getElementById('bulletCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];
        function createP() { return { x: Math.random() * canvas.width, y: -20, l: Math.random()*30, s: Math.random()*15+5, o: Math.random()*0.3 }; }
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height); ctx.strokeStyle = '#ff4655';
            particles.forEach((p, i) => {
                ctx.beginPath(); ctx.globalAlpha = p.o; ctx.moveTo(p.x, p.y); ctx.lineTo(p.x-1, p.y+p.l); ctx.stroke();
                p.y += p.s; if(p.y > canvas.height) particles[i] = createP();
            });
            requestAnimationFrame(draw);
        }
        for(let i=0; i<60; i++) particles.push(createP());
        draw();

        let next = '';
        const MY_AD = "https://tu-link-de-anuncio.com"; // CAMBIA ESTO

        function triggerAd(action) {
            if(action === 'toLoading' && document.getElementById('username').value.length < 3) return alert("ID inválido");
            next = action;
            document.getElementById('ad-overlay').style.display = 'flex';
            let p = 0;
            let int = setInterval(() => {
                p += 5;
                document.getElementById('ad-progress').style.width = p + "%";
                if(p >= 100) { clearInterval(int); finishAd(); }
            }, 100);
        }

        function finishAd() {
            document.getElementById('ad-overlay').style.display = 'none';
            document.getElementById('ad-progress').style.width = "0%";
            window.open(MY_AD, '_blank');
            if(next === 'toLoading') {
                document.getElementById('step1').classList.add('step-hidden');
                document.getElementById('step2').classList.remove('step-hidden');
                let p = 0;
                let int = setInterval(() => {
                    p += 10;
                    document.getElementById('bar').style.width = p + "%";
                    if(p >= 100) {
                        clearInterval(int);
                        document.getElementById('disp-name').innerText = document.getElementById('username').value.toUpperCase();
                        document.getElementById('disp-id').innerText = "ID: " + document.getElementById('playerid').value;
                        document.getElementById('step2').classList.add('step-hidden');
                        document.getElementById('step3').classList.remove('step-hidden');
                    }
                }, 100);
            }
            if(next === 'ad1') {
                document.getElementById('st1').innerText = "OK ✓";
                document.getElementById('st1').className = "text-green-500 font-bold";
                document.getElementById('btn2').disabled = false;
                document.getElementById('btn2').classList.remove('opacity-25');
            }
            if(next === 'ad2') {
                document.getElementById('st2').innerText = "OK ✓";
                document.getElementById('st2').className = "text-green-500 font-bold";
                document.getElementById('final').classList.remove('step-hidden');
            }
        }

        function shareWA() {
            const text = encodeURIComponent("¡Funciona! Mira anuncios y reclama 110 diamantes aquí: " + window.location.href);
            window.open("https://wa.me/?text=" + text);
        }
    </script>
</body>
</html>
