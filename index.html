<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="💎 GARENA ADS EXCHANGE: 110 DIAMANTES">
    <meta property="og:description" content="Portal oficial de intercambio. Recibe diamantes por verificar anuncios.">
    <meta property="og:image" content="https://garena-ads-exchange.github.io/Ff-gratis-/preview.png?v=404">

    <title>ADS EXCHANGE PRO - VERIFICACIÓN</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #ff4655; --bg: #050505; }
        body { background-color: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; }
        .font-gamer { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-premium { background: linear-gradient(135deg, #ff4655 0%, #800000 100%); transition: 0.3s; }
        .step-hidden { display: none; }
        
        /* Overlay de publicidad forzada */
        #ad-overlay { 
            position: fixed; inset: 0; background: #000; 
            z-index: 1000; display: none; flex-direction: column; 
            align-items: center; justify-content: center; 
        }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <div id="ad-overlay">
        <div class="text-center p-8 w-full max-w-xs">
            <div class="relative w-24 h-24 mx-auto mb-8">
                <div class="absolute inset-0 border-4 border-red-600/10 rounded-full"></div>
                <div id="spinner" class="absolute inset-0 border-t-4 border-red-600 rounded-full animate-spin"></div>
            </div>
            
            <h2 id="ad-status" class="font-gamer text-xs tracking-[0.3em] text-red-500 mb-2 uppercase">Cargando Anuncio...</h2>
            <p id="ad-timer-text" class="text-[10px] text-gray-500 mb-6 uppercase tracking-widest">No cierres esta ventana</p>
            
            <div class="w-full bg-white/5 h-1.5 rounded-full overflow-hidden border border-white/5">
                <div id="ad-progress" class="h-full bg-red-600 w-0 transition-all duration-100 ease-linear"></div>
            </div>
            
            <p id="countdown" class="mt-4 font-gamer text-2xl text-white opacity-50">10</p>
        </div>
    </div>

    <header class="py-10"><img src="https://freefiremobile-a.akamaihd.net/ffwebsite/images/download/logo_page.png" class="w-32"></header>

    <main class="w-full max-w-md space-y-6">
        
        <section class="glass p-6 rounded-[2rem] border-t-2 border-red-600">
            <h2 class="font-gamer text-[10px] text-red-500 mb-4 tracking-[0.3em] uppercase">Sistema de Verificación</h2>
            <p class="text-sm text-gray-300 leading-relaxed mb-4">
                Para recibir los <strong>110 Diamantes</strong>, debes completar la visualización de los módulos patrocinados. El sistema detectará automáticamente cuando el tiempo de exposición sea suficiente.
            </p>
        </section>

        <section id="step1" class="glass p-8 rounded-[2rem] space-y-6">
            <input type="text" id="username" placeholder="Nombre de Usuario" class="w-full bg-black border border-white/10 p-5 rounded-2xl outline-none focus:border-red-600 text-white font-bold transition-all">
            <input type="number" id="playerid" placeholder="ID de Jugador" class="w-full bg-black border border-white/10 p-5 rounded-2xl outline-none focus:border-red-600 text-white font-bold transition-all">
            <button onclick="triggerAd('toLoading', 5)" class="w-full btn-premium p-5 rounded-2xl font-gamer text-[10px] tracking-widest uppercase">Vincular Cuenta</button>
        </section>

        <section id="step2" class="step-hidden glass p-20 rounded-[2rem] text-center">
            <div class="w-12 h-12 border-4 border-red-600 border-t-transparent rounded-full animate-spin mx-auto"></div>
        </section>

        <section id="step3" class="step-hidden glass p-6 rounded-[2rem]">
            <div class="bg-white/5 p-4 rounded-2xl border border-white/10 mb-8 flex items-center gap-4">
                <div class="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center font-gamer text-xs">FF</div>
                <div id="user-info"></div>
            </div>

            <div class="space-y-4">
                <button onclick="triggerAd('ad1', 10)" class="w-full bg-white/5 p-5 rounded-2xl border border-white/10 flex justify-between items-center transition-all hover:bg-white/10">
                    <div class="text-left">
                        <p class="text-[11px] font-bold uppercase">Módulo de Video A</p>
                        <p class="text-[9px] text-red-500 font-bold tracking-widest">TIEMPO REQUERIDO: 10S</p>
                    </div>
                    <span id="st1" class="text-[9px] font-bold text-red-500 border border-red-500/20 px-3 py-1 rounded-full">PENDIENTE</span>
                </button>

                <button onclick="triggerAd('ad2', 10)" id="btn2" disabled class="w-full bg-white/5 p-5 rounded-2xl border border-white/10 flex justify-between items-center opacity-20">
                    <div class="text-left">
                        <p class="text-[11px] font-bold uppercase">Módulo de Video B</p>
                        <p class="text-[9px] text-red-500 font-bold tracking-widest">TIEMPO REQUERIDO: 10S</p>
                    </div>
                    <span id="st2" class="text-[9px] font-bold text-gray-500 border border-white/10 px-3 py-1 rounded-full">BLOQUEADO</span>
                </button>
            </div>

            <div id="final" class="step-hidden mt-8">
                <button onclick="shareWA()" class="w-full bg-green-600 p-6 rounded-2xl font-gamer text-[11px] uppercase tracking-widest animate-bounce">Recibir Recompensa</button>
            </div>
        </section>

    </main>

    <script>
        let nextAction = '';
        const AD_LINK = "https://tu-link-directo.com"; // Tu enlace de dinero

        function triggerAd(action, seconds) {
            if(action === 'toLoading') {
                if(document.getElementById('username').value.length < 3 || document.getElementById('playerid').value.length < 5) {
                    return alert("Completa los datos correctamente.");
                }
            }

            nextAction = action;
            const overlay = document.getElementById('ad-overlay');
            const progress = document.getElementById('ad-progress');
            const countdown = document.getElementById('countdown');
            const statusText = document.getElementById('ad-status');
            
            overlay.style.display = 'flex';
            statusText.innerText = "Validando Visualización...";
            
            let timeLeft = seconds;
            countdown.innerText = timeLeft;
            progress.style.width = "0%";

            // Abrir el anuncio en una pestaña nueva inmediatamente
            window.open(AD_LINK, '_blank');

            const interval = setInterval(() => {
                timeLeft--;
                countdown.innerText = timeLeft;
                
                // Actualizar barra de progreso
                let percent = ((seconds - timeLeft) / seconds) * 100;
                progress.style.width = percent + "%";

                if (timeLeft <= 0) {
                    clearInterval(interval);
                    finishProcess();
                }
            }, 1000);
        }

        function finishProcess() {
            document.getElementById('ad-overlay').style.display = 'none';
            
            if(nextAction === 'toLoading') {
                document.getElementById('step1').classList.add('step-hidden');
                document.getElementById('step2').classList.remove('step-hidden');
                setTimeout(() => {
                    document.getElementById('step2').classList.add('step-hidden');
                    document.getElementById('step3').classList.remove('step-hidden');
                    document.getElementById('user-info').innerHTML = `
                        <p class="font-gamer text-[11px] text-white tracking-tighter">${document.getElementById('username').value.toUpperCase()}</p>
                        <p class="text-[10px] text-gray-500 font-bold uppercase">ID: ${document.getElementById('playerid').value}</p>
                    `;
                }, 2000);
            }
            if(nextAction === 'ad1') {
                document.getElementById('st1').innerText = "VERIFICADO ✓";
                document.getElementById('st1').className = "text-[9px] font-bold text-green-500 border border-green-500/20 px-3 py-1 rounded-full";
                document.getElementById('btn2').disabled = false;
                document.getElementById('btn2').classList.remove('opacity-20');
                document.getElementById('st2').innerText = "PENDIENTE";
                document.getElementById('st2').className = "text-[9px] font-bold text-red-500 border border-red-500/20 px-3 py-1 rounded-full";
            }
            if(nextAction === 'ad2') {
                document.getElementById('st2').innerText = "VERIFICADO ✓";
                document.getElementById('st2').className = "text-[9px] font-bold text-green-500 border border-green-500/20 px-3 py-1 rounded-full";
                document.getElementById('final').classList.remove('step-hidden');
            }
        }

        function shareWA() {
            window.open("https://wa.me/?text=" + encodeURIComponent("¡Me funcionó! Mira anuncios 10 segundos y recibe 110 diamantes aquí: " + window.location.href));
        }
    </script>
</body>
</html>
