<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADS EXCHANGE - RECARGA OFICIAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00ff88; --danger: #ff4655; --bg: #0b0e11; }
        body { background-color: var(--bg); color: #e1e1e1; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        .font-gamer { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(20, 23, 28, 0.95); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .glow-red { text-shadow: 0 0 10px rgba(255, 70, 85, 0.5); }
        .btn-main { background: linear-gradient(135deg, #ff4655 0%, #8b0000 100%); transition: all 0.3s; }
        
        #ad-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .progress-bar { height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; width: 80%; }
        #ad-progress { height: 100%; background: var(--danger); width: 0%; transition: width 1s linear; box-shadow: 0 0 15px #ff4655; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <div id="ad-overlay">
        <div class="text-center w-full max-w-sm px-6">
            <h2 class="font-gamer text-[10px] text-red-500 mb-6 tracking-[0.4em] uppercase glow-red">Validando Sesión con Sponsor...</h2>
            
            <div id="countdown" class="font-gamer text-7xl text-white mb-6">15</div>
            
            <div class="progress-bar mx-auto mb-8">
                <div id="ad-progress"></div>
            </div>
            
            <div id="ad-container" class="min-h-[250px] w-full bg-white/5 rounded-2xl border border-white/10 flex items-center justify-center overflow-hidden">
                <p id="ad-status" class="text-[9px] text-gray-500 animate-pulse uppercase">Cargando Sponsor Oficial...</p>
            </div>
            
            <p class="text-[9px] text-gray-600 mt-6 uppercase tracking-widest">No cierres esta ventana para validar el ID</p>
        </div>
    </div>

    <main class="w-full max-w-md mt-4">
        <div class="flex justify-between items-center mb-6 px-2">
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-[10px] font-bold tracking-widest text-green-500 uppercase">Servidor: Online</span>
            </div>
            <div class="text-[10px] text-gray-500 font-gamer">V 2.5</div>
        </div>

        <header class="text-center mb-8">
            <h1 class="font-gamer text-2xl font-bold italic tracking-tighter glow-red text-white">💎 ADS <span class="text-red-500">EXCHANGE</span></h1>
            <p class="text-[11px] text-gray-400 mt-2 uppercase tracking-widest italic">Intercambio Directo por Publicidad</p>
        </header>

        <section id="step1" class="glass p-8 rounded-[2.5rem] space-y-6">
            <div>
                <label class="text-[10px] text-red-500 font-bold uppercase mb-4 block tracking-widest ml-1">Ingresar ID de Jugador</label>
                <input type="number" id="playerid" placeholder="00000000" class="w-full bg-black/50 border border-white/10 p-5 rounded-2xl outline-none text-white font-bold text-center text-3xl tracking-[0.2em] focus:border-red-600 shadow-inner">
            </div>
            <button onclick="startAudit('toLoading', 15)" class="w-full btn-main p-6 rounded-2xl font-gamer text-[12px] text-white uppercase tracking-widest font-bold shadow-lg">
                Verificar y Vincular
            </button>
        </section>

        <section id="step2" class="hidden space-y-4">
            <div class="glass p-6 rounded-[2.5rem] space-y-3">
                <p class="text-center text-[10px] text-gray-500 uppercase font-gamer mb-4">Módulos de Patrocinio</p>
                
                <button onclick="startAudit('ad1', 20)" id="b1" class="w-full bg-white/5 p-5 rounded-2xl border border-white/10 flex justify-between items-center">
                    <div class="text-left"><p class="text-[12px] font-bold tracking-wide">MÓDULO ALPHA</p><p id="sub1" class="text-[9px] text-red-500 font-bold uppercase">Pendiente</p></div>
                    <span id="st1" class="text-[10px] font-bold border border-red-500 text-red-500 px-4 py-1 rounded-lg">INICIAR</span>
                </button>

                <button onclick="startAudit('ad2', 20)" id="b2" disabled class="w-full bg-white/5 p-5 rounded-2xl border border-white/10 flex justify-between items-center opacity-20">
                    <div class="text-left"><p class="text-[12px] font-bold tracking-wide text-gray-400">MÓDULO BETA</p><p id="sub2" class="text-[9px] text-gray-600 uppercase">Bloqueado</p></div>
                    <span id="st2" class="text-[10px] font-bold border border-white/10 text-gray-500 px-4 py-1 rounded-lg">WAIT</span>
                </button>

                <div id="final" class="hidden mt-6 pt-4 border-t border-white/5">
                    <button onclick="shareWA()" class="w-full bg-green-500 p-6 rounded-2xl font-gamer text-[12px] text-black font-bold uppercase shadow-[0_0_20px_#00ff88] animate-bounce">
                        ✅ Solicitar Recarga
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script>
        // CONFIGURACIÓN DE TUS CÓDIGOS
        const SMARTLINK = "https://www.profitablecpmratenetwork.com/idp1u4wz4q?key=21e16c3e1d058194b709c314dbe26e55";
        const BANNER_JS = "https://pl29291497.profitablecpmratenetwork.com/b19ca2676094a68085d2bb3d761280fb/invoke.js";
        
        let currentStep = '';
        let shareCount = 0;

        function startAudit(step, secs) {
            if(step === 'toLoading' && document.getElementById('playerid').value.length < 5) return alert("ID NO VÁLIDO");
            
            currentStep = step;
            const overlay = document.getElementById('ad-overlay');
            const counter = document.getElementById('countdown');
            const progress = document.getElementById('ad-progress');
            const adContainer = document.getElementById('ad-container');
            
            overlay.style.display = 'flex';
            counter.innerText = secs;
            progress.style.width = '0%';
            
            // 1. Abrir Publicidad Smartlink
            window.open(SMARTLINK, '_blank');

            // 2. Cargar Banner Nativo en el overlay
            adContainer.innerHTML = '';
            const script = document.createElement('script');
            script.src = BANNER_JS;
            const div = document.createElement('div');
            div.id = 'container-b19ca2676094a68085d2bb3d761280fb';
            adContainer.appendChild(script);
            adContainer.appendChild(div);

            // 3. Temporizador
            let time = secs;
            const timer = setInterval(() => {
                time--;
                counter.innerText = time;
                progress.style.width = ((secs - time) / secs * 100) + '%';
                
                if(time <= 0) {
                    clearInterval(timer);
                    overlay.style.display = 'none';
                    logic();
                }
            }, 1000);
        }

        function logic() {
            if(currentStep === 'toLoading') {
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
            } else if(currentStep === 'ad1') {
                document.getElementById('st1').innerText = "LISTO";
                document.getElementById('sub1').innerText = "Validado ✓";
                document.getElementById('sub1').className = "text-[9px] text-green-500 font-bold uppercase";
                document.getElementById('st1').className = "text-[10px] font-bold border border-green-500 text-green-500 px-4 py-1 rounded-lg";
                document.getElementById('b2').disabled = false;
                document.getElementById('b2').classList.remove('opacity-20');
            } else if(currentStep === 'ad2') {
                document.getElementById('st2').innerText = "LISTO";
                document.getElementById('sub2').innerText = "Validado ✓";
                document.getElementById('sub2').className = "text-[9px] text-green-500 font-bold uppercase";
                document.getElementById('st2').className = "text-[10px] font-bold border border-green-500 text-green-500 px-4 py-1 rounded-lg";
                document.getElementById('final').classList.remove('hidden');
            }
        }

        function shareWA() {
            const msg = "💎 ADS-EXCHANGE 💎\nValida 30s de marcas oficiales y recibe 110 unidades. Intercambio directo sin costo.\nLink oficial: " + window.location.href;
            if(shareCount < 2) {
                alert("Debes compartir en 2 grupos para validar el tráfico humano.");
                window.open("https://wa.me/?text=" + encodeURIComponent(msg), '_blank');
                shareCount++;
            } else {
                alert("✅ AUDITORÍA EXITOSA. ID validado. Recarga en proceso (1-12h).");
                location.reload();
            }
        }
    </script>
</body>
</html>
